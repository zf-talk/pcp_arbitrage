map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream pcp_web_dashboard {
    server 127.0.0.1:8765;
    keepalive 8;
}

server {
    listen 80;
    listen [::]:80;
    server_name pcp.local;

    access_log /var/log/nginx/pcp-arbitrage.access.log combined;
    error_log  /var/log/nginx/pcp-arbitrage.error.log warn;

    client_max_body_size 8m;

    location / {
        proxy_pass http://pcp_web_dashboard;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket（仪表板 /ws-data）
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
